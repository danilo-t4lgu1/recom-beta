# .github/workflows/daily-recompute.yml
name: Daily recompute (RULE-03)

on:
  schedule:
    # 06:00 UTC = 03:00 BRT (Brasil não observa horário de verão desde 2019) — D-52.
    - cron: '0 6 * * *'
  workflow_dispatch:
    # Disparo manual para teste (SC#2: rodar 2x no mesmo dia) e para o 1º rollout
    # supervisionado (D-64): permite rodar em dry-run e depois com escrita real sem
    # tocar a repository variable persistente WRITE_ENABLED.
    inputs:
      write:
        description: 'Gravar de verdade na loja? (false = dry-run, D-62/D-64)'
        type: boolean
        default: false
      first_rollout:
        description: 'É o 1º rollout supervisionado? (true isenta o disjuntor D-63)'
        type: boolean
        default: false

permissions:
  contents: write # mínimo necessário para o commit-back (D-45)

jobs:
  recompute:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app-partners-recomendados
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app-partners-recomendados/package-lock.json

      - run: npm ci

      - name: Rodar job diário (ingestão + recompute + fila de aprovação)
        env:
          NUVEMSHOP_ACCESS_TOKEN: ${{ secrets.NUVEMSHOP_ACCESS_TOKEN }}
          NUVEMSHOP_STORE_ID: ${{ secrets.NUVEMSHOP_STORE_ID }}
          WRITE_FAILURE_WEBHOOK_URL: ${{ secrets.WRITE_FAILURE_WEBHOOK_URL }}
          # Toggle de liquidação (override 2026-07-17): limiar de "grade
          # disponível" (D-04). Vazio => default 3 (grade cheia, operação
          # normal). Defina a variável de repositório MIN_SIZES_IN_STOCK=1 em
          # Settings > Secrets and variables > Actions > Variables para afrouxar
          # para "qualquer tamanho com estoque" durante promoções agressivas —
          # liga/desliga sem editar código nem redeploy.
          MIN_SIZES_IN_STOCK: ${{ vars.MIN_SIZES_IN_STOCK }}
          # Kill switch do regime diário de escrita automática (D-62). Ausente ou
          # 'false' => dry-run (calcula e loga o que gravaria, NÃO escreve). Defina
          # a repository variable WRITE_ENABLED='true' em Settings > Secrets and
          # variables > Actions > Variables para ligar a escrita real do cron —
          # liga/desliga sem editar código nem redeploy. Botão nativo "Disable
          # workflow" é a parada dura (o cron nem dispara).
          WRITE_ENABLED: ${{ vars.WRITE_ENABLED }}
          # Override manual do run: input do workflow_dispatch tem prioridade sobre
          # WRITE_ENABLED (1º rollout supervisionado D-64). Vazio no cron agendado.
          WRITE_OVERRIDE: ${{ github.event.inputs.write }}
          # Isenção do disjuntor (D-63) só no 1º rollout supervisionado. Vazio/false
          # no regime automático — o disjuntor sempre vale a partir do 2º run.
          FIRST_ROLLOUT: ${{ github.event.inputs.first_rollout }}
          # Bypass do guard de mesmo dia (D-48) — achado do 1º rollout supervisionado
          # (07-08/D-64): dry-run e escrita real no MESMO dia via workflow_dispatch
          # colidem com o guard (a 2ª chamada cairia no skip e não gravaria nada).
          # SÓ verdadeiro quando disparado manualmente (workflow_dispatch); o `schedule`
          # do cron NUNCA passa por aqui com valor 'true' — o guard segue protegendo
          # o regime automático diário (nunca reingere/roda 2x sozinho no mesmo dia).
          ALLOW_SAME_DAY_RERUN: ${{ github.event_name == 'workflow_dispatch' }}
        # Sem argumentos, o script ingere o CATÁLOGO COMPLETO (as 11 categorias
        # de taxonomia, D-26) — a lista canônica vive em product-group.js, então
        # nenhum nome acentuado precisa ser digitado aqui no YAML.
        run: node scripts/run-daily-job.js

      - name: Commit-back do catálogo atualizado (D-45)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f data/catalog.db
          if git diff --cached --quiet; then
            echo "Nenhuma mudança em data/catalog.db (provavelmente guard de mesmo dia ativou) — nada a commitar."
            exit 0
          fi
          git commit -m "chore(daily): recompute automático [skip ci]"
          git push

